<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Monitoria de Atendimento Wick</title>
<style>
  :root {
    --bg-main: #0f0c1b;
    --bg-card: #1a162e;
    --primary: #9d4edf;
    --primary-glow: rgba(157, 78, 223, 0.2);
    --secondary: #ff7b00;
    --text-main: #f3f0ff;
    --text-muted: #a29bfe;
    --border: #2d264d;
    --success: #00e676;
  }

  body {
    margin: 0; padding: 0;
    font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background-color: var(--bg-main);
    color: var(--text-main);
    min-height: 100vh;
  }

  header {
    background: rgba(26, 22, 46, 0.8);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
    color: var(--text-main);
    font-weight: 800;
    font-size: 24px;
    letter-spacing: 0.5px;
    text-align: center;
    padding: 20px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 4px 20px rgba(0,0,0,0.3);
  }

  header span {
    color: var(--secondary);
  }

  .container {
    max-width: 850px;
    margin: 40px auto 60px auto;
    padding: 0 20px;
  }

  .section-card {
    background: var(--bg-card);
    border-radius: 16px;
    padding: 30px;
    margin-bottom: 30px;
    border: 1px solid var(--border);
    box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }

  .section-card:hover {
    box-shadow: 0 8px 32px var(--primary-glow);
    border-color: #44337a;
  }

  .section-title {
    font-size: 19px;
    font-weight: 700;
    color: var(--secondary);
    margin-top: 0;
    margin-bottom: 25px;
    display: flex;
    align-items: center;
    gap: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
  }

  .form-group {
    margin-bottom: 22px;
  }

  label {
    font-weight: 600;
    color: var(--text-muted);
    display: block;
    margin-bottom: 10px;
    font-size: 14px;
  }

  input[type=text], input[type=date], select, textarea {
    width: 100%;
    padding: 14px 16px;
    font-size: 15px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background-color: #120e24;
    box-sizing: border-box;
    transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    color: #fff;
    font-family: inherit;
  }

  input[type=text]:focus, input[type=date]:focus, select:focus, textarea:focus {
    outline: none;
    border-color: var(--primary);
    background-color: #161033;
    box-shadow: 0 0 0 4px var(--primary-glow);
  }

  select {
    cursor: pointer;
    appearance: none;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='10' height='10' fill='%239d4edf'><path d='M0 3l5 5 5-5z'/></svg>");
    background-repeat: no-repeat;
    background-position: right 16px center;
  }

  textarea {
    resize: vertical;
    min-height: 80px;
  }

  .actions-container {
    display: flex;
    gap: 20px;
    margin-top: 40px;
  }

  button {
    flex: 1;
    background: linear-gradient(135deg, var(--secondary) 0%, #ff5500 100%);
    color: white;
    font-weight: 700;
    font-size: 16px;
    border: none;
    padding: 16px 30px;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.3s ease;
    box-shadow: 0 4px 15px rgba(255, 123, 0, 0.4);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  button:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(255, 123, 0, 0.6);
  }

  .limpar-btn {
    background: transparent;
    color: #ff4d4d;
    border: 2px solid #ff4d4d;
    box-shadow: none;
  }

  .limpar-btn:hover {
    background-color: rgba(255, 77, 77, 0.1);
    color: #ff4d4d;
    box-shadow: none;
  }

  @media (max-width: 680px) {
    .grid-2 {
      grid-template-columns: 1fr;
      gap: 0;
    }
    .actions-container {
      flex-direction: column;
    }
  }
</style>
</head>
<body>

<header>Monitoria de Atendimento <span>Wick</span></header>

<div class="container">
  <form id="monitoriaForm" onsubmit="return false;">
    
    <!-- ETAPA 0: METADADOS -->
    <div class="section-card">
      <div class="section-title">📊 Informações do Painel</div>
      <div class="grid-2">
        <div class="form-group">
          <label for="avaliador">Nome do Avaliador</label>
          <input type="text" id="avaliador" name="avaliador" placeholder="Quem está avaliando?" required>
        </div>
        <div class="form-group">
          <label for="avaliado">Nome do Avaliado</label>
          <input type="text" id="avaliado" name="avaliado" placeholder="Quem foi avaliado?" required>
        </div>
      </div>
      <div class="grid-2">
        <div class="form-group">
          <label for="cliente">Cliente do Atendimento</label>
          <input type="text" id="cliente" name="cliente" placeholder="Nome do cliente" required>
        </div>
        <div class="form-group">
          <label for="protocolo">Protocolo do Atendimento</label>
          <input type="text" id="protocolo" name="protocolo" placeholder="Nº do Protocolo">
        </div>
      </div>
      <div class="form-group">
        <label for="data">Data da Avaliação</label>
        <input type="date" id="data" name="data" required>
      </div>
    </div>

    <!-- ETAPA 1: CONTEXTO GERAL -->
    <div class="section-card">
      <div class="section-title">1️⃣ Triagem & Contexto Inicial</div>
      
      <div class="grid-2">
        <div class="form-group">
          <label for="q4">Operadora</label>
          <select id="q4" name="q4">
            <option value="">Selecione</option>
            <option value="Claro">Claro</option>
            <option value="Vivo">Vivo</option>
            <option value="Tim">Tim</option>
            <option value="-">-</option>
          </select>
        </div>
        <div class="form-group">
          <label for="q2">Houve pausas excessivas sem justificativa?</label>
          <select id="q2" name="q2">
            <option value="">Selecione</option>
            <option value="0">Sim</option>
            <option value="1">Não</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label for="q5">Tipo de solicitação (cancelamento, fatura, portabilidade, etc.)</label>
        <textarea id="q5" name="q5" placeholder="Descreva qual foi a demanda solicitada..."></textarea>
      </div>

      <div class="form-group">
        <label for="q1">Tempo total do atendimento</label>
        <textarea id="q1" name="q1" placeholder="Indique a duração total observada..."></textarea>
      </div>
    </div>

    <!-- ETAPA 2: ABORDAGEM E SEGURANÇA -->
    <div class="section-card">
      <div class="section-title">2️⃣ Início do Contato & Segurança</div>
      
      <div class="form-group">
        <label for="q9">Tempo para responder a primeira mensagem dentro do SLA?</label>
        <select id="q9" name="q9">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q6">Identificação do cliente confirmada?</label>
        <select id="q6" name="q6">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q14">Confirmação correta dos dados do cliente (nome, CPF, linha)?</label>
        <select id="q14" name="q14">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q15">Validação de informações sensíveis de forma segura?</label>
        <select id="q15" name="q15">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q16">Coleta apenas do necessário para a demanda?</label>
        <select id="q16" name="q16">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>
    </div>

    <!-- ETAPA 3: COMUNICAÇÃO E EMPATIA -->
    <div class="section-card">
      <div class="section-title">3️⃣ Qualidade Gráfica & Soft Skills</div>

      <div class="form-group">
        <label for="q7">Uso do nome do cliente durante a conversa?</label>
        <select id="q7" name="q7">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q8">Tom educado e profissional no texto?</label>
        <select id="q8" name="q8">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q10">Linguagem clara, sem termos técnicos desnecessários?</label>
        <select id="q10" name="q10">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q11">Mensagens objetivas, sem textos longos que confundam?</label>
        <select id="q11" name="q11">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q12">Escrita correta (gramática e ortografia)?</label>
        <select id="q12" name="q12">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q13">Uso adequado de emojis e formatação?</label>
        <select id="q13" name="q13">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q23">Mostrou compreensão pela situação do cliente?</label>
        <select id="q23" name="q23">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q24">Evitou respostas automáticas que não condizem com o caso?</label>
        <select id="q24" name="q24">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q25">Manteve calma e cordialidade mesmo em casos de cliente irritado?</label>
        <select id="q25" name="q25">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>
    </div>

    <!-- ETAPA 4: RESOLUÇÃO TÉCNICA -->
    <div class="section-card">
      <div class="section-title">4️⃣ Resolução & Processos Internos</div>

      <div class="form-group">
        <label for="q18">Entendimento total do problema antes de responder?</label>
        <select id="q18" name="q18">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q19">Explicação clara dos procedimentos?</label>
        <select id="q19" name="q19">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q20">Passo a passo para o cliente, quando necessário?</label>
        <select id="q20" name="q20">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q21">Cumprimento de políticas internas da operadora?</label>
        <select id="q21" name="q21">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q22">Uso correto de scripts obrigatórios?</label>
        <select id="q22" name="q22">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <!-- NOVA PERGUNTA INSERIDA AQUI -->
      <div class="form-group">
        <label for="q28">Fez a transferência de forma devida?</label>
        <select id="q28" name="q28">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
          <option value="cliente_nao_transferido">Cliente não foi transferido</option>
          <option value="nao_houve_necessidade">Não houve necessidade de transferência</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q17">Registro no sistema/Tabulação?</label>
        <select id="q17" name="q17">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>
    </div>

    <!-- ETAPA 5: FECHAMENTO -->
    <div class="section-card">
      <div class="section-title">5️⃣ Conclusão & Encerramento</div>

      <div class="form-group">
        <label for="q26">Confirmou que o problema foi resolvido?</label>
        <select id="q26" name="q26">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q27">Orientou sobre próximos passos ou protocolos?</label>
        <select id="q27" name="q27">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>

      <div class="form-group">
        <label for="q3">Se despediu de forma formal e cordial?</label>
        <select id="q3" name="q3">
          <option value="">Selecione</option>
          <option value="1">Sim</option>
          <option value="0">Não</option>
        </select>
      </div>
    </div>

    <div class="actions-container">
      <button type="button" onclick="gerarPDF()">🚀 Emitir Relatório PDF</button>
      <button type="button" class="limpar-btn" onclick="limparPerguntas()">Limpar Tudo</button>
    </div>
  </form>
</div>

<img id="logoWick" src="https://i.postimg.cc/WpY8c1jL/wick-roxo-sem-fundo.png" style="display:none;" crossorigin="anonymous" />

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
const perguntas = [
  "Tempo total do atendimento",
  "Houve pausas excessivas sem justificativa?",
  "Se despediu de forma formal e cordial?",
  "Operadora",
  "Tipo de solicitação (cancelamento, fatura, portabilidade, etc.)",
  "Identificação do cliente confirmada?",
  "Uso do nome do cliente durante a conversa?",
  "Tom educado e profissional no texto?",
  "Tempo para responder a primeira mensagem dentro do SLA?",
  "Linguagem clara, sem termos técnicos desnecessários?",
  "Mensagens objetivas, sem textos longos que confundam?",
  "Escrita correta (gramática e ortografia)?",
  "Uso adequado de emojis e formatação?",
  "Confirmação correta dos dados do cliente (nome, CPF, linha)?",
  "Validação de informações sensíveis de forma segura?",
  "Coleta apenas do necessário para a demanda?",
  "Registro no sistema/Tabulação?",
  "Entendimento total do problema antes de responder?",
  "Explicação clara dos procedimentos?",
  "Passo a passo para o cliente, quando necessário?",
  "Cumprimento de políticas internas da operadora?",
  "Uso correto de scripts obrigatórios?",
  "Mostrou compreensão pela situação do cliente?",
  "Evitou respostas automáticas que não condizem com o caso?",
  "Manteve calma e cordialidade mesmo em casos de cliente irritado?",
  "Confirmou que o problema foi resolvido?",
  "Orientou sobre próximos passos ou protocolos?",
  "Fez a transferência de forma devida?" /* Pergunta 28 adicionada na lista */
];

const pesos = [
  1, 1, 3, 0, 1, 3, 2, 3, 3, 3,
  2, 3, 1, 3, 3, 2, 1, 3, 3, 2,
  2, 2, 3, 2, 3, 3, 2, 2 /* Peso atribuído para a pergunta 28 */
];

function quebraLinha(doc, texto, x, y, lineHeight, maxWidth = 180) {
  const splitText = doc.splitTextToSize(texto, maxWidth);
  splitText.forEach((line, i) => {
    doc.text(line, x, y + (i * lineHeight));
  });
  return y + (splitText.length * lineHeight);
}

function checarQuebraPagina(doc, y, lineHeight, margemInferior = 20) {
  const paginaAltura = doc.internal.pageSize.getHeight();
  if (y + lineHeight > paginaAltura - margemInferior) {
    doc.addPage();
    return 10;
  }
  return y;
}

async function gerarPDF() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();

  const img = document.getElementById('logoWick');
  if (!img.complete) await new Promise(resolve => { img.onload = resolve; img.onerror = resolve; });

  const imgWidth = 50;
  const imgHeight = 15;
  const pageWidth = doc.internal.pageSize.getWidth();
  const imgX = pageWidth - imgWidth - 10;
  const imgY = 10;
  doc.addImage(img, 'PNG', imgX, imgY, imgWidth, imgHeight);

  let y = imgY + 5;
  const margin = 10;
  const lineHeight = 8;

  doc.setFontSize(16);
  doc.setTextColor("#6a0dad");
  doc.text("Monitoria de Atendimento Wick", margin, y);
  y += lineHeight * 1.5;

  doc.setFontSize(12);
  doc.setTextColor("#000");

  const dataRaw = document.getElementById("data").value || "";
  let dataFormatada = "Não informado";
  if (dataRaw) {
    const partes = dataRaw.split("-");
    if (partes.length === 3) dataFormatada = `${partes[2]}/${partes[1]}/${partes[0]}`;
  }

  const avaliador = document.getElementById("avaliador").value.trim() || "Não informado";
  const avaliado = document.getElementById("avaliado").value.trim() || "Não informado";
  const cliente = document.getElementById("cliente").value.trim() || "Não informado";
  const protocolo = document.getElementById("protocolo").value.trim() || "Não informado";

  y = checarQuebraPagina(doc, y, lineHeight);
  doc.text(`Data: ${dataFormatada}`, margin, y);
  y += lineHeight;
  y = checarQuebraPagina(doc, y, lineHeight);
  doc.text(`Avaliador: ${avaliador}`, margin, y);
  y += lineHeight;
  y = checarQuebraPagina(doc, y, lineHeight);
  doc.text(`Avaliado: ${avaliado}`, margin, y);
  y += lineHeight;
  y = checarQuebraPagina(doc, y, lineHeight);
  doc.text(`Cliente: ${cliente}`, margin, y);
  y += lineHeight;
  y = checarQuebraPagina(doc, y, lineHeight);
  doc.text(`Protocolo: ${protocolo}`, margin, y);
  y += lineHeight * 1.5;

  let somaPontos = 0;
  let totalPeso = 0;

  for (let i = 0; i < perguntas.length; i++) {
    const num = i + 1;
    let resposta = "";

    const el = document.getElementById(`q${num}`);
    if (num === 1 || num === 5) {
      resposta = el ? el.value.trim() : "";
      if (!resposta) resposta = "Não respondido";
    } else if (num === 4) {
      resposta = el ? el.value : "";
      if (!resposta) resposta = "Não informado";
    } else if (num === 28) {
      // Tratamento personalizado da exibição da resposta da pergunta nova no PDF
      const val = el ? el.value : "";
      if (val === "1") resposta = "Sim";
      else if (val === "0") resposta = "Não";
      else if (val === "cliente_nao_transferido") resposta = "Cliente não foi transferido";
      else if (val === "nao_houve_necessidade") resposta = "Não houve necessidade de transferência";
      else resposta = "Não respondido";
    } else {
      resposta = el ? el.value : "";
      if (!resposta) resposta = "Não respondido";
      if (resposta === "1") resposta = "Sim";
      else if (resposta === "0") resposta = "Não";
    }

    const textoPergunta = `${num} - ${perguntas[i]}: ${resposta}`;
    y = checarQuebraPagina(doc, y, lineHeight);
    y = quebraLinha(doc, textoPergunta, margin, y, lineHeight);

    // Regra de soma de pontos
    if (![1,4,5].includes(num)) {
      // Se for a pergunta 28 e a opção for de "não houve necessidade", ela neutraliza o peso para não prejudicar a nota
      if (num === 28 && ["cliente_nao_transferido", "nao_houve_necessidade"].includes(el?.value)) {
         // Não soma no total nem nos pontos (Ignora o peso)
      } else {
         if (resposta === "Sim") somaPontos += pesos[i];
         totalPeso += pesos[i];
      }
    }

    y += lineHeight / 2;
  }

  y = checarQuebraPagina(doc, y, lineHeight * 2);
  const percentual = totalPeso > 0 ? (somaPontos / totalPeso) * 100 : 0;
  doc.setFontSize(14);
  doc.setTextColor("#6a0dad");
  doc.text(`Nota final: ${percentual.toFixed(2)}%`, margin, y);

  doc.save("monitoria_atendimento_wick.pdf");
}

function limparPerguntas() {
  for (let i = 1; i <= 28; i++) {
    const el = document.getElementById(`q${i}`);
    if (el) {
      if (el.tagName === "SELECT") el.value = "";
      else if (el.tagName === "TEXTAREA") el.value = "";
    }
  }
}
</script>

</body>
</html>
